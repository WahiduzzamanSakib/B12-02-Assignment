<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- title -->
    <title>Faugei Flower Shop</title>

    <style>
        body {
            font-family: "Inter", sans-serif;
        }
    </style>
</head>

<body class="max-w-[90%] mx-auto m-10 bg-base-200">
    <header>
        <nav class="bg-gray-50 flex justify-between p-1 rounded-sm">
            <div class="navber-left">
                <img src="./assets/logo.png" alt="">
            </div>
            <div class="navber-right flex justify-center items-center">
                <div class="right hidden md:flex gap-4">
                    <p>Home</p>
                    <p class="text-gray-400">Shop</p>
                    <p class="text-gray-400">About us</p>
                </div>
                <div>
                    <p class="ml-4">🛒 Cart {$56}</p>
                </div>
            </div>
        </nav>
    </header>
    <main>

        <section>
            <div class="grid grid-cols-2">
                <div class="flex flex-col justify-center">
                    <h2 class="text-5xl font-bold mb-4">ALWAYS <span class="text-orange-400">FRESH <br> FLOWERS</span></h2>
                    <p class="text-gray-500">Indulge your senses with the beauty and fragrance of <br> our fresh . From classic roses to
                        exotic blooms, <br> we offer a wide variety of fresh flowers that are <br> perfect for any
                        occasion. </p>
                </div>
                <div class="flex justify-end">
                    <img src="./assets/hero-flower.png" alt="hero-flower.png">
                </div>
            </div>
        </section>

    </main>


</body>

</html>
